<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/styles/style.css">
    <title>Controle de Fornecedores</title>
</head>
<body class="home-page">
    <main class="home-shell">
        <h1>Controle de Fornecedores</h1>

        <section class="home-card" aria-label="Ferramentas principais">
            <div class="home-grid">
                <button id="btnConsultar" class="action-card" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10.5 4a6.5 6.5 0 1 0 4.12 11.53l4.42 4.41 1.41-1.41-4.41-4.42A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Zm-2 1.5a1 1 0 0 0 0 2h4a1 1 0 1 0 0-2h-4Zm0 3a1 1 0 0 0 0 2h4a1 1 0 1 0 0-2h-4Z"/>
                    </svg>
                    <span>Consultar</span>
                </button>

                <button id="btnCadastrar" class="action-card" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9 6.5A2.5 2.5 0 0 1 11.5 4h7A2.5 2.5 0 0 1 21 6.5v4a1 1 0 1 1-2 0v-4a.5.5 0 0 0-.5-.5h-7a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5h3a1 1 0 1 1 0 2h-3A2.5 2.5 0 0 1 9 17.5v-11ZM4.5 8A2.5 2.5 0 0 0 2 10.5v7A2.5 2.5 0 0 0 4.5 20h4a1 1 0 1 0 0-2h-4a.5.5 0 0 1-.5-.5v-7a.5.5 0 0 1 .5-.5H8.5a1 1 0 1 0 0-2h-4ZM19 15h-2v-2a1 1 0 1 0-2 0v2h-2a1 1 0 1 0 0 2h2v2a1 1 0 1 0 2 0v-2h2a1 1 0 1 0 0-2Z"/>
                    </svg>
                    <span>Cadastrar</span>
                </button>

                <button id="btnAlterar" class="action-card" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15.67 3.3a2.25 2.25 0 0 1 3.18 3.18l-8.9 8.9a1 1 0 0 1-.46.26l-3.2.8a1 1 0 0 1-1.21-1.21l.8-3.2a1 1 0 0 1 .26-.46l8.9-8.9ZM14.26 4.7 6.94 12.03l-.45 1.8 1.8-.45 7.32-7.32-1.35-1.35Zm2.77 0 1.35 1.35.06-.06a.25.25 0 0 0 0-.35l-1-1a.25.25 0 0 0-.35 0l-.06.06ZM5 6a3 3 0 0 1 3-3h3a1 1 0 1 1 0 2H8a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-3a1 1 0 1 1 2 0v3a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V6Z"/>
                    </svg>
                    <span>Alterar</span>
                </button>

                <button id="btnExcluir" class="action-card" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9 3a1 1 0 0 0-1 1v1H5a1 1 0 1 0 0 2h.62l.9 10.78A3 3 0 0 0 9.5 21h5a3 3 0 0 0 2.99-3.22L18.38 7H19a1 1 0 1 0 0-2h-3V4a1 1 0 0 0-1-1H9Zm2 2V5h2v0h-2Zm-3.37 2h8.74l-.87 10.62a1 1 0 0 1-1 .88h-5a1 1 0 0 1-1-.88L7.63 7Zm2.37 2a1 1 0 0 0-1 1v5a1 1 0 1 0 2 0v-5a1 1 0 0 0-1-1Zm4 0a1 1 0 0 0-1 1v5a1 1 0 1 0 2 0v-5a1 1 0 0 0-1-1Z"/>
                    </svg>
                    <span>Excluir</span>
                </button>
            </div>

            <p class="home-helper">
                Acesse as principais ferramentas para gerenciar sua base de fornecedores de forma eficiente.
            </p>
        </section>

        <footer class="home-footer">
            <div class="home-logo" aria-hidden="true"></div>
            <p>Feito em: <span id="currentDate"></span></p>
        </footer>
    </main>

    <div class="floating-star" aria-hidden="true"></div>

    <script>
        const currentDate = document.getElementById("currentDate");
        if (currentDate) {
            const now = new Date();
            currentDate.textContent = now.toLocaleDateString("pt-BR");
        }
    </script>
    <script type="module" src="./src/scripts/script.js"></script>
</body>
</html>
