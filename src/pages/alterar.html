<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar dados</title>
     <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="app-page">
    <main class="app-shell">
        <h2>Sistema de Alteração de Dados</h2>
        <p class="app-subtitle">Localize um fornecedor pelo código e atualize os campos desejados.</p>

        <section class="cadastro-container" aria-label="Formulário de alteração">
            <p><label for="inpCod">Código:</label> <input id="inpCod" type="text"></p>
            <p><label for="inpNome">Nome:</label> <input id="inpNome" type="text"></p>
            <p><label for="inpEmail">E-mail:</label> <input id="inpEmail" type="text"></p>
            <p><label for="inpUf">UF:</label> <input id="inpUf" type="text"></p>
            <p><label for="inpPassword">Password:</label> <input id="inpPassword" type="text"></p>
            <p><label for="inpLevel">Level:</label> <input id="inpLevel" type="text"></p>

            <div class="form-actions">
                <button id="btnAlterar" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.67 3.3a2.25 2.25 0 0 1 3.18 3.18l-8.9 8.9a1 1 0 0 1-.46.26l-3.2.8a1 1 0 0 1-1.21-1.21l.8-3.2a1 1 0 0 1 .26-.46l8.9-8.9ZM14.26 4.7 6.94 12.03l-.45 1.8 1.8-.45 7.32-7.32-1.35-1.35Zm2.77 0 1.35 1.35.06-.06a.25.25 0 0 0 0-.35l-1-1a.25.25 0 0 0-.35 0l-.06.06ZM5 6a3 3 0 0 1 3-3h3a1 1 0 1 1 0 2H8a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-3a1 1 0 1 1 2 0v3a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V6Z"/></svg>
                    <span>Alterar</span>
                </button>
                <button id="btnLimpar" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.24 3.56a1 1 0 0 1 1.41 0l2.79 2.79a1 1 0 0 1 0 1.41l-9.9 9.9a1 1 0 0 1-.46.26l-4.12 1.03a1 1 0 0 1-1.21-1.21l1.03-4.12a1 1 0 0 1 .26-.46l9.9-9.9ZM15.53 6.4l-8.84 8.84-.51 2.06 2.06-.51 8.84-8.84-1.55-1.55Zm2.96.14 1.38-1.38-1.38-1.38-1.38 1.38 1.38 1.38ZM3 20a1 1 0 0 1 1-1h16a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Z"/></svg>
                    <span>Limpar</span>
                </button>
                <button id="btnVoltar" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.53 5.47a1 1 0 0 1 0 1.41L6.41 11H20a1 1 0 1 1 0 2H6.41l4.12 4.12a1 1 0 0 1-1.41 1.41l-5.83-5.83a1 1 0 0 1 0-1.41l5.83-5.82a1 1 0 0 1 1.41 0Z"/></svg>
                    <span>Voltar</span>
                </button>
            </div>
        </section>
    </main>
    <script type="module" src="../scripts/alterar.js"></script>
</body>
</html>
